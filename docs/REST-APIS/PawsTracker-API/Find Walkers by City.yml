info:
  name: Find Walkers by City
  type: http
  seq: 2

http:
  method: GET
  url: https://api.pawstracker.local/v1/walkers?city=Dallas
  params:
    - name: city
      value: Dallas
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
