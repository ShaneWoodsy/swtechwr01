name: Spectral API Linter

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.yaml'
      - '**.yml'

jobs:
  spectral-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Spectral
        uses: stoplightio/spectral-action@latest
        with:
          file_glob: '**.yaml'
          repo_token: ${{ secrets.GITHUB_TOKEN }}
