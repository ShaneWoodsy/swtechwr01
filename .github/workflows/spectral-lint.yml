name: Spectral API Linter

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  spectral-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Spectral
        uses: stoplightio/spectral-action@latest
        with:
          file_glob: '**.yaml'
          spectral_ruleset: '.spectral.yaml'
          repo_token: ${{ secrets.GITHUB_TOKEN }}
